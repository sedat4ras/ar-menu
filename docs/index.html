<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Menü</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      text-align: center;
    }

    p.subtitle {
      font-size: 0.95rem;
      color: #555;
      text-align: center;
      margin-bottom: 24px;
    }

    model-viewer {
      width: 100%;
      max-width: 480px;
      height: 420px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    model-viewer::part(default-ar-button) {
      display: none;
    }

    #ar-button {
      display: block;
      margin: 20px auto 0;
      padding: 14px 36px;
      background: #ff6b00;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(255, 107, 0, 0.35);
      transition: background 0.2s, transform 0.1s;
    }

    #ar-button:active {
      background: #e05e00;
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <h1>AR Menü</h1>
  <p class="subtitle">Modeli gerçek dünyada görmek için "AR'da Gör" butonuna bas.</p>

  <model-viewer
    id="viewer"
    src="models/test.glb"
    ios-src="models/test.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="3D yemek modeli"
  ></model-viewer>

  <button id="ar-button" onclick="document.getElementById('viewer').activateAR()">
    AR'da Gör
  </button>

</body>
</html>
